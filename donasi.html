<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donasi Kindnesia - Crowdfunding Social and Nature</title>
    <link rel="stylesheet" href="donasi.css">
</head>
<body>

<header>
    <div class="container nav">
        <h1 class="logo">Kindnesia</h1>
        <nav>
            <a href="index.html">Beranda</a>
            <a href="details.html">Kembali</a>
        </nav>
    </div>
</header>

<main>
    <div class="card glass">
            <h2>Form Donasi</h2>

            <div id="successMsg" class="success-msg" style="display:none;">
                Donasi Anda berhasil dikirim! Terima kasih atas kepedulian Anda.
            </div>

            <form id="donasiForm">
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan nama Anda" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Masukkan email" required>
                </div>

                <div class="form-group">
                    <label for="nominal">Pilih Nominal</label>
                    <select id="nominal" required>
                        <option value="">Pilih Donasi</option>
                        <option value="10000">Rp 10.000</option>
                        <option value="25000">Rp 25.000</option>
                        <option value="50000">Rp 50.000</option>
                        <option value="100000">Rp 100.000</option>
                        <option value="250000">Rp 250.000</option>
                        <option value="500000">Rp 500.000</option>
                        <option value="1000000">Rp 1.000.000</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="metode">Metode Pembayaran</label>
                    <select id="metode" required>
                        <option value="">Pilih Metode</option>
                        <option>Transfer Bank (BCA / BNI / Mandiri)</option>
                        <option>E-Wallet (OVO, DANA, GoPay)</option>
                        <option>QRIS</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="bukti">Bukti Transfer</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="bukti" accept=".pdf,.jpg,.jpeg,.png" required>
                        <label for="bukti" class="file-upload-label">
                            <span id="fileNameDisplay">Pilih file (PDF / JPG / PNG)</span>
                        </label>
                    </div>
                    <p class="file-hint">Format yang diterima: PDF, JPG, PNG. Maks. 5 MB.</p>
                </div>

                <div class="form-group">
                    <label for="pesan">Pesan Dukungan <span class="optional">(Opsional)</span></label>
                    <textarea id="pesan" placeholder="Tulis pesan atau doa untuk kampanye ini..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Donasi Sekarang</button>
            </form>
        </div>
</main>
<footer>
    <div class="footer-content container">
        <div>
            <h3>Kindnesia</h3>
            <p>Platform donasi untuk lingkungan yang lebih baik.</p>
        </div>
    </div>
    <div class="copyright">
        <p>© 2026 Kindnesia | Copyright by Kelompok Gatau</p>
    </div>
</footer>

<script src="donasi.js"></script>
</body>
</html>
