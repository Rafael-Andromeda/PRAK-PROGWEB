<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Kindnesia - Crowdfunding Social and Nature</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<header>
  <h1>Kindnesia</h1>
  <nav>
    <a href="index.html">Beranda</a>
    <a href="#">Login</a>
  </nav>
</header>

<div class="login-container">
  <div class="login-box">

    <h2 class="title-box">Masuk ke Akun</h2>

    <div class="role-toggle">
      <button class="active" onclick="setRole('donatur', this)">Donatur</button>
      <button onclick="setRole('pengelola', this)">Pengelola Kampanye</button>
    </div>

    <div class="input-group">
      <label>Email / Username</label>
      <input type="text" placeholder="Username atau Email">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" placeholder="Password">
    </div>

    <button class="login-btn" id="loginBtn">
      Masuk sebagai Donatur
    </button>

  </div>
</div>

<footer>
  © 2026 Kindnesia
</footer>
<script src="login.js"></script>
</body>
</html>
