<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login TreeVolution - Crowdfunding Lingkungan</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<header>
  <h1>Treevolution</h1>
  <nav>
    <a href="index.html">Beranda</a>
    <a href="#">Login</a>
  </nav>
</header>

<div class="login-container">
  <div class="login-box">

    <h2 class="title-box">Masuk ke Akun</h2>

    <div class="role-toggle">
      <button class="active" onclick="setRole('donatur', this)">Donatur</button>
      <button onclick="setRole('pengelola', this)">Pengelola Kampanye</button>
    </div>

    <div class="input-group">
      <label>Email / Username</label>
      <input type="text" placeholder="Username atau Email">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" placeholder="Password">
    </div>

    <button class="login-btn" id="loginBtn">
      Masuk sebagai Donatur
    </button>

  </div>
</div>

<footer>
  © 2026 Treevolution
</footer>

<script>
function setRole(role, el) {
  const buttons = document.querySelectorAll(".role-toggle button");
  buttons.forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");

  const loginBtn = document.getElementById("loginBtn");
  if (role === "donatur") {
    loginBtn.innerText = "Masuk sebagai Donatur";
  } else {
    loginBtn.innerText = "Masuk sebagai Pengelola";
  }
}
</script>

</body>
</html>
